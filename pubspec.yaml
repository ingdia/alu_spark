name: alu_spark
description: "ALU Spark — The official internship and opportunity platform for the African Leadership University ecosystem."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  url_launcher: ^6.3.0
  shimmer: ^3.0.0
  cloudinary_flutter: ^1.0.0
  cloudinary_url_gen: ^1.0.0
  file_picker: ^9.0.0
  image_picker: ^1.0.4
  http: ^1.1.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash_bg.jpg
    - assets/images/onboarding_1.jpg
    - assets/images/onboarding_2.jpg
    - assets/images/onboarding_3.jpg
    - assets/images/featured_1.jpg
    - assets/images/featured_2.jpg
    - assets/images/detail_bg.jpg
    - assets/images/profile_cover.jpg
    - assets/images/avatar_alex.jpg
    - assets/images/avatar_1.jpg
    - assets/images/avatar_2.jpg
    - assets/images/avatar_3.jpg
    - assets/images/avatar_4.jpg
